<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Tab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://zenithkandel.com.np/fontawesome/zenith-icons.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#f5ecd9] text-[#3f2d1d] font-sans antialiased overflow-hidden flex h-screen">

    <!-- LEFT SIDEBAR -->
    <aside class="w-64 border-r border-[#d97706]/30 flex flex-col h-full bg-[#f0e2c2]/50">
        <div class="p-6 font-serif font-bold text-xl tracking-wider text-[#92400e] border-b border-[#d97706]/30">Nerd Tab</div>
        <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-2" id="nav-menu">
            <!-- Dynamically populated or static -->
            <button class="nav-item active w-full text-left px-4 py-2 rounded-md hover:bg-[#d97706]/20 transition-colors" data-target="dashboard">Dashboard</button>
            <button class="nav-item w-full text-left px-4 py-2 rounded-md hover:bg-[#d97706]/20 transition-colors" data-target="syllabus">Syllabus</button>
            <button class="nav-item w-full text-left px-4 py-2 rounded-md hover:bg-[#d97706]/20 transition-colors" data-target="tasks">Tasks</button>
            <button class="nav-item w-full text-left px-4 py-2 rounded-md hover:bg-[#d97706]/20 transition-colors" data-target="timer">Study Timer</button>
            <button class="nav-item w-full text-left px-4 py-2 rounded-md hover:bg-[#d97706]/20 transition-colors" data-target="analytics">Analytics</button>
        </nav>
        <div class="p-4 border-t border-[#d97706]/30">
            <button class="nav-item w-full text-left px-4 py-2 rounded-md hover:bg-[#d97706]/20 transition-colors" data-target="settings">Settings</button>
        </div>
    </aside>

    <!-- CONTENT WRAPPER -->
    <div class="flex-1 flex flex-col h-full min-w-0">
        <!-- TOP BAR -->
        <header class="h-16 border-b border-[#d97706]/30 flex items-center justify-between px-8 bg-[#f5ecd9]">
            <div class="flex items-center w-1/3">
                <div class="relative w-full max-w-sm">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-[#92400e]/50"></i>
                    <input type="text" id="cmd-input" placeholder="Search / Commands... (/)" class="w-full bg-[#f0e2c2] border border-[#d97706]/30 rounded-md py-1.5 pl-9 pr-4 text-sm focus:outline-none focus:border-[#92400e] text-[#3f2d1d] placeholder-[#92400e]/50 shadow-sm leading-tight">
                </div>
            </div>
            <div class="font-serif italic text-[#92400e] opacity-80 text-sm hidden md:block" id="motivational-quote">Focus on the process, the outcome will follow.</div>
            <div class="flex items-center space-x-6 text-sm font-semibold tracking-wide">
                <span id="current-date" class="text-[#92400e]/80"></span>
                <span id="current-time" class="text-[#92400e]"></span>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <main class="flex-1 flex overflow-hidden">
            <!-- MIDDLE / MAIN CONTENT -->
            <div class="flex-1 overflow-y-auto p-8 relative" id="main-content">
                <!-- Dashboard View -->
                <section id="view-dashboard" class="view-section active h-full flex flex-col">
                    <h1 class="text-3xl font-serif font-bold text-[#92400e] mb-6">Dashboard</h1>
                    <div class="grid grid-cols-2 gap-6 flex-1">
                        <div class="panel p-6 shadow-sm border border-[#d97706]/20 rounded-sm bg-[#f0e2c2]" id="dashboard-tasks-wrapper">
                            <h2 class="text-xl font-bold border-b border-[#d97706]/20 pb-2 mb-4">Today's priority</h2>
                            <ul id="dashboard-tasks" class="space-y-2"></ul>
                        </div>
                        <div class="panel p-6 shadow-sm border border-[#d97706]/20 rounded-sm bg-[#f0e2c2]" id="dashboard-next-topics">
                            <h2 class="text-xl font-bold border-b border-[#d97706]/20 pb-2 mb-4">Up next in Syllabus</h2>
                            <div id="next-topics-container" class="space-y-3"></div>
                        </div>
                    </div>
                </section>

                <!-- Syllabus View -->
                <section id="view-syllabus" class="view-section hidden h-full flex-col">
                    <div class="flex justify-between items-end border-b border-[#d97706]/20 pb-4 mb-6">
                        <h1 class="text-3xl font-serif font-bold text-[#92400e]">Syllabus</h1>
                        <div class="text-sm font-mono bg-[#f0e2c2] px-3 py-1 rounded border border-[#d97706]/20">Progress: <span id="syllabus-total-progress" class="font-bold text-[#d97706]">0%</span></div>
                    </div>
                    <div id="syllabus-tree-container" class="flex-1 overflow-y-auto pr-4">
                        <!-- Rendered recursively -->
                    </div>
                </section>

                <!-- Tasks, Timer, Analytics views can be added similarly -->
                <section id="view-tasks" class="view-section hidden h-full flex-col"><h1 class="text-3xl font-serif font-bold text-[#92400e] mb-6">Tasks</h1></section>
                <section id="view-timer" class="view-section hidden h-full flex-col"><h1 class="text-3xl font-serif font-bold text-[#92400e] mb-6">Study Timer</h1></section>
                <section id="view-analytics" class="view-section hidden h-full flex-col"><h1 class="text-3xl font-serif font-bold text-[#92400e] mb-6">Analytics</h1></section>
                <section id="view-settings" class="view-section hidden h-full flex-col"><h1 class="text-3xl font-serif font-bold text-[#92400e] mb-6">Settings</h1></section>
            </div>

            <!-- RIGHT PANEL -->
            <aside class="w-72 border-l border-[#d97706]/30 bg-[#f5ecd9] p-6 flex flex-col overflow-y-auto hidden lg:flex space-y-6">
                <!-- Pomodoro -->
                <div class="panel border border-[#d97706]/20 rounded-sm p-4 bg-[#f0e2c2] shadow-sm text-center">
                    <h3 class="text-xs uppercase tracking-widest font-bold text-[#92400e]/70 mb-2">Focus</h3>
                    <div id="timer-display" class="font-mono text-4xl font-bold text-[#92400e] my-3">25:00</div>
                    <div class="flex justify-center space-x-2">
                        <button id="timer-toggle" class="border border-[#92400e] text-[#92400e] px-4 py-1 text-sm font-bold shadow-sm hover:bg-[#92400e] hover:text-[#f5ecd9] transition-colors rounded-sm uppercase tracking-wide">Start</button>
                        <button id="timer-reset" class="text-[#92400e]/50 hover:text-[#92400e] px-2 transition-colors"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="panel border border-[#d97706]/20 rounded-sm p-4 bg-[#f0e2c2] shadow-sm">
                    <h3 class="text-xs uppercase tracking-widest font-bold text-[#92400e]/70 mb-2">Today</h3>
                    <div class="flex justify-between text-sm py-1 border-b border-dashed border-[#d97706]/20">
                        <span>Deep Work</span> <span id="stat-deep-work" class="font-bold">0h 0m</span>
                    </div>
                    <div class="flex justify-between text-sm py-1">
                        <span>Streak</span> <span class="font-bold text-[#d97706]"><span id="stat-streak">0</span> days</span>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
